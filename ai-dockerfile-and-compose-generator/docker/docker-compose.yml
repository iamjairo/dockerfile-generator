version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Dockerfile Generator — local development stack
#
# Services:
#   app     — Streamlit Python application (port 8501)
#   ollama  — Local LLM runtime (port 11434) [optional profile]
#
# Usage:
#   Standard (cloud AI providers only):
#     docker compose up --build
#
#   With local Ollama:
#     docker compose --profile ollama up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─────────────────────────── Streamlit App ────────────────────────────────
  app:
    build:
      context: ..           # repo root (one level up from /docker)
      dockerfile: docker/Dockerfile
    container_name: dockerfile-generator
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env                # copy .env.example → .env and fill in your keys
    environment:
      # Passed explicitly so they're visible even without an .env file
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      # Point the app at the local Ollama container when the profile is active
      OLLAMA_BASE_URL: "http://ollama:11434"
    volumes:
      # Mount source for hot-reload during development.
      # Remove this block for a fully baked production image.
      - ..:/app
      # Preserve the pip install layer; prevents overwriting /usr/local from the host
      - /app/__pycache__
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      ollama:
        condition: service_healthy
        required: false   # only waits when the ollama profile is active

  # ──────────────────────────── Ollama (optional) ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: dockerfile-generator-ollama
    profiles:
      - ollama             # only starts with: docker compose --profile ollama up
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama   # persist downloaded models across restarts
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ─────────────────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge

volumes:
  ollama-models:
    name: dockerfile-generator-ollama-models
